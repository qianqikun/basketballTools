services:
  basketball-tools:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: basketball-tools
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
      - PORT=3000
    volumes:
      - ./data:/app/data
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  srs-live:
    image: hub.rat.dev/ossrs/srs:5
    container_name: srs-live
    restart: unless-stopped
    ports:
      - "1935:1935"
      - "1985:1985"
      - "18000:18000/udp"
      - "18080:8080"
    environment:
      - SRS_RTC_SERVER_LISTEN=18000
      - SRS_RTC_SERVER_CANDIDATE=${SRS_CANDIDATE:-127.0.0.1}

